experiment:
  name: robustness_normal
  benchmark: synthetic
  num_episodes: 100
  hard_family_ratio: 0.7
  split:
    accumulation: 60
    test: 40
  random_seed: 42

variants:
  mas_no_memory:
    enabled: true
    orchestrator_local_memory: false
    blackboard: true
    memory_curation: false
    policy_engine: true

  mas_orchestrator_memory:
    enabled: true
    orchestrator_local_memory: true
    blackboard: true
    memory_curation: true
    policy_engine: true
    seed_memories: true
    memory_source: curated

  mas_shuffled_memory:
    enabled: true
    orchestrator_local_memory: true
    memory_source: shuffled
    seed_memories: true
    blackboard: true
    memory_curation: false
    policy_engine: true

  mas_random_memory:
    enabled: true
    orchestrator_local_memory: true
    memory_source: random
    seed_memories: true
    blackboard: true
    memory_curation: false
    policy_engine: true
