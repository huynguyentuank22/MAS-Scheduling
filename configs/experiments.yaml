experiment:
  name: synthetic_memory_ablation
  benchmark: synthetic
  num_episodes: 100
  hard_family_ratio: 0.7
  split:
    accumulation: 60
    test: 40
  random_seed: 42

variants:
  mas_no_memory:
    enabled: true
    orchestrator_local_memory: false
    blackboard: true
    memory_curation: false
    policy_engine: true

  mas_orchestrator_memory:
    enabled: true
    orchestrator_local_memory: true
    blackboard: true
    memory_curation: true
    policy_engine: true
    seed_memories: true
    memory_source: curated

  mas_shuffled_memory:
    enabled: true
    orchestrator_local_memory: true
    memory_source: shuffled
    seed_memories: true
    blackboard: true
    memory_curation: false
    policy_engine: true

metrics:
  benchmark:
    - task_success
    - official_score
  scheduling:
    - agent_assignment_quality
    - dependency_violation_rate
    - unnecessary_agent_calls
    - replan_count
    - retry_count
    - recovery_success_rate
  memory:
    - memory_hit_rate
    - useful_memory_rate
    - harmful_memory_rate
    - negative_transfer_rate
    - memory_growth_rate
  cost:
    - llm_calls
    - tool_calls
    - token_cost_estimate
    - latency_sec
